# One command to run the whole stack:  docker compose up --build
# Default uses SQLite inside the backend container (zero extra services).
# A Postgres service is included but commented — uncomment it and switch the
# DATABASE_URL + schema provider to "postgresql" for a production-like setup.
services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: "file:./dev.db"
      JWT_SECRET: "demo-secret-change-me"
      PORT: "4000"
      NODE_ENV: "production"
